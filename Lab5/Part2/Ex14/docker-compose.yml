services:
  web:
    image: nginx:alpine
    container_name: ex14-web
    networks:
      - private-net

  client:
    image: curlimages/curl:8.7.1
    container_name: ex14-client
    depends_on:
      - web
    command: sh -c "while true; do echo 'Client calling web...'; curl -s http://web | head -n 5; echo '---'; sleep 10; done"
    networks:
      - private-net

networks:
  private-net:
    driver: bridge
